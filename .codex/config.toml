[mcp_servers.presto-query]
command = "bash"
args = ["-lc", 'root="${SPX_HELPER_ROOT:-$PWD}"; script="$root/scripts/codex-mcp-launch.sh"; if [[ ! -x "$script" ]]; then echo "Set SPX_HELPER_ROOT to your spx-helper repo path (current: $root)" >&2; exit 69; fi; exec "$script" presto-query']
cwd = "."
env_vars = ["SPX_HELPER_ROOT", "PRESTO_PERSONAL_TOKEN", "PRESTO_USERNAME"]

